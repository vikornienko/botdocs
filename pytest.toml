# pytest.toml
# Требует pytest >= 9.0
# Наивысший приоритет — никакой другой файл не перебьёт этот

[pytest]
minversion = "9.0"

testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["src"]

asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
]

filterwarnings = [
    "error",
    "ignore::DeprecationWarning:aiogram",
    "ignore::DeprecationWarning:aiosqlite",
]

markers = [
    "unit: быстрые unit-тесты без внешних зависимостей",
    "integration: интеграционные тесты хендлеров aiogram3",
    "db: тесты базы данных SQLite",
    "slow: медленные тесты",
]
