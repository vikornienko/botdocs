# mypy.ini
# Документация: https://mypy.readthedocs.io/

[mypy]
# ──────────────────────────────────────────────
# ОСНОВНЫЕ НАСТРОЙКИ
# ──────────────────────────────────────────────

# Версия Python, которую мы проверяем.
# Синхронизируем с target-version в ruff.toml.
python_version = 3.13

# Директории с исходным кодом бота.
# mypy будет искать модули здесь.
mypy_path = src

# Показывать коды ошибок в выводе (например, [arg-type]).
# Удобно для точечного подавления через # type: ignore[код].
show_error_codes = true

# Показывать полный контекст ошибки (соседние строки).
show_error_context = true

# Показывать column-номер ошибки — полезно в VS Code.
show_column_numbers = true

# Цветной вывод в терминале.
color_output = true

# Форматировать сообщения об ошибках красиво.
pretty = true

# ──────────────────────────────────────────────
# СТРОГОСТЬ ПРОВЕРОК
# ──────────────────────────────────────────────
# Мы НЕ используем флаг --strict целиком, так как он включает
# disallow_untyped_calls, что конфликтует с aiogram-декораторами
# (router.message(), router.callback_query() и т.д.).
# Вместо этого включаем нужные опции вручную.

# Запрещаем функции без аннотаций типов.
# Гарантирует, что все handler-функции аннотированы.
disallow_untyped_defs = true

# Запрещаем частично аннотированные функции
# (некоторые аргументы есть, некоторых нет).
disallow_incomplete_defs = true

# Предупреждать, если mypy не может проверить функцию
# из-за отсутствия аннотаций (из сторонних библиотек).
warn_return_any = true

# Предупреждать о неиспользуемых # type: ignore комментариях.
# Держит кодовую базу чистой от "протухших" подавлений.
warn_unused_ignores = true

# Предупреждать об избыточных isinstance()-проверках,
# когда тип уже известен mypy.
warn_redundant_casts = true

# Проверять тела функций, даже если они не имеют аннотаций.
# Важно для постепенного введения типизации.
check_untyped_defs = true

# Запрещать Any как тип возвращаемого значения (осторожно!).
# Отключено: aiogram callback_data иногда возвращает Any.
# disallow_any_generics = true  ← раскомментировать по мере зрелости проекта

# Запрещать переопределение переменных с другим типом.
# Ловит баги вида: result = "error"; result = 42
no_implicit_reexport = true

# Строгая обработка Optional.
# Запрещает передавать None туда, где ожидается конкретный тип.
strict_optional = true

# ──────────────────────────────────────────────
# УПРАВЛЕНИЕ ИМПОРТАМИ И СТОРОННИМИ БИБЛИОТЕКАМИ
# ──────────────────────────────────────────────

# Игнорировать ошибки "stub файл не найден" для библиотек
# без аннотаций типов. aiogram3 поставляется с inline-типами,
# но некоторые зависимости могут не иметь стабов.
ignore_missing_imports = false

# Следовать импортам для нахождения типов в зависимостях.
# Позволяет mypy понимать типы из aiogram, aiohttp и т.д.
follow_imports = normal

# ──────────────────────────────────────────────
# КЭШИРОВАНИЕ
# ──────────────────────────────────────────────

# Директория кэша mypy. Добавьте .mypy_cache в .gitignore.
cache_dir = .mypy_cache

# Инкрементальный режим: перепроверять только изменённые файлы.
# Ускоряет повторные запуски в CI/CD и при разработке.
incremental = true

# ──────────────────────────────────────────────
# НАСТРОЙКИ ДЛЯ КОНКРЕТНЫХ МОДУЛЕЙ
# ──────────────────────────────────────────────

# aiogram3 поставляется с полными inline type annotations (py.typed marker),
# поэтому специальная секция не нужна — mypy понимает его "из коробки".

# aiohttp — зависимость aiogram, также типизирована.
# Никаких дополнительных настроек не требуется.

# pydantic v2 (если используется для настроек бота через BaseSettings)
# также полностью типизирован.

# Для сторонних библиотек БЕЗ стабов — отключаем ошибки точечно:
# [mypy-some_untyped_library.*]
# ignore_missing_imports = true

# ──────────────────────────────────────────────
# ИСКЛЮЧЕНИЯ ДЛЯ ТЕСТОВ
# ──────────────────────────────────────────────

[mypy-tests.*]
# В тестах разрешаем неаннотированные функции —
# pytest-фикстуры и тест-функции могут не иметь return-аннотаций.
disallow_untyped_defs = false
disallow_incomplete_defs = false
# Разрешаем Any в тестах для mock-объектов.
warn_return_any = false
