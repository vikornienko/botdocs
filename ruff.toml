#:schema https://raw.githubusercontent.com/astral-sh/ruff/main/crates/ruff_workspace/schema.json
# ruff.toml
# Документация: https://docs.astral.sh/ruff/

# ──────────────────────────────────────────────
# ОБЩИЕ НАСТРОЙКИ
# ──────────────────────────────────────────────

# Целевая версия Python.
# aiogram3 требует Python 3.10+, поэтому фиксируем 3.12
# как актуальную стабильную версию для учебных проектов.
target-version = "py313"

# Максимальная длина строки.
# 88 — стандарт Black/Ruff. Достаточно для читаемости
# handler-функций и inline-клавиатур aiogram.
line-length = 88

# Папки, которые ruff полностью игнорирует.
# .venv — виртуальное окружение uv, __pycache__ — кэш байткода.
exclude = [
    ".venv",
    "__pycache__",
    ".git",
    ".mypy_cache",
    "migrations",      # если используете Alembic/SQLAlchemy
]

# Показывать исправленные нарушения при --fix
show-fixes = true

# ──────────────────────────────────────────────
# ЛИНТИНГ: ПРАВИЛА
# ──────────────────────────────────────────────

[lint]

# Список подключённых групп правил.
# Каждая группа объяснена ниже.
select = [
    "E",    # pycodestyle errors  — базовые ошибки стиля PEP 8
    "W",    # pycodestyle warnings — предупреждения стиля PEP 8
    "F",    # pyflakes — логические ошибки (неиспользуемые импорты и т.д.)
    "I",    # isort — порядок импортов
    "N",    # pep8-naming — конвенции именования (классы, функции, переменные)
    "UP",   # pyupgrade — устаревший синтаксис → современный (Python 3.12+)
    "B",    # flake8-bugbear — потенциальные баги и проблемы дизайна
    "C4",   # flake8-comprehensions — лишние конструкции в list/dict/set
    "SIM",  # flake8-simplify — упрощение if/else, with, return и т.д.
    "TCH",  # flake8-type-checking — TYPE_CHECKING-блоки для оптимизации
    "ANN",  # flake8-annotations — контроль наличия аннотаций типов
    "ASYNC",# flake8-async — проблемы в async-коде (aiogram3 — async фреймворк!)
    "RUF",  # ruff-specific — собственные правила ruff
    "PT",   # flake8-pytest-style — правила оформления pytest-тестов
    "TID",  # flake8-tidy-imports — запрет относительных импортов и т.д.
    "ERA",  # eradicate — закомментированный (мёртвый) код
    "PL",   # pylint — подмножество правил pylint (сложность, дубли и т.д.)
    "C90",  # mccabe — цикломатическая сложность функций
]

# Правила, которые мы явно отключаем, с обоснованием:
ignore = [
    # ANN101/ANN102 — аннотации self/cls в методах классов.
    # В Python 3.11+ это избыточно и шумно в handler-классах aiogram.
    "ANN101",
    "ANN102",

    # ANN401 — запрет Any. Слишком жёстко для учебных проектов;
    # Any иногда нужен при работе с callback_data aiogram.
    "ANN401",

    # E501 — длина строки. Мы уже управляем этим через formatter,
    # дублировать проверку в линтере избыточно.
    "E501",

    # PLR0913 — "слишком много аргументов" у функции.
    # Handler-функции aiogram (message, state, bot, ...) нарушают это правило
    # по своей природе через Dependency Injection.
    "PLR0913",

    # B008 — "не вызывай функцию в значениях аргументов по умолчанию".
    # Конфликтует с aiogram-паттерном: router = Router() на уровне модуля.
    "B008",

    # ERA001 — закомментированный код. Полезно в продакшне, но
    # в учебных проектах часто нужны закомментированные примеры.
    # Оставим как предупреждение (W), убрав из ошибок.
    "ERA001",

    # SIM108 — принудительный тернарный оператор.
    # Иногда снижает читаемость в handler-коде.
    "SIM108",
]

# Правила, к которым применяется автоисправление --fix
fixable = ["ALL"]
unfixable = [
    # F401 — удаление "неиспользуемых" импортов.
    # Осторожно: в __init__.py-файлах aiogram-роутеров импорты
    # могут быть нужны для регистрации хэндлеров (side-effects).
    "F401",
]

# ──────────────────────────────────────────────
# ПРАВИЛА С ДОПОЛНИТЕЛЬНЫМИ НАСТРОЙКАМИ
# ──────────────────────────────────────────────

# Цикломатическая сложность.
# Функция сложнее 10 → сигнал разбить на части.
# Актуально для сложных FSM-хэндлеров aiogram.
[lint.mccabe]
max-complexity = 10

# Настройки isort (управление импортами).
[lint.isort]
# Разделяем стандартную библиотеку, сторонние пакеты и наш код.
# Критично для читаемости: сразу видно, где aiogram, где наш код.
known-first-party = ["bot"]  # имя вашего пакета
force-sort-within-sections = true
split-on-trailing-comma = true

# Настройки pylint.
[lint.pylint]
# Максимум веток в функции (if/elif/else, try/except).
# 12 — разумный компромисс для FSM-хэндлеров.
max-branches = 12
# Максимум return-операторов.
max-returns = 6
# Максимальное количество операторов в теле функции.
max-statements = 50

# Настройки для ANN (аннотации).
[lint.flake8-annotations]
# Не требовать аннотации для **kwargs в handler-ах.
allow-star-arg-any = true
# Игнорировать отсутствие return-аннотации у "тривиальных" функций.
mypy-init-return = true
suppress-dummy-args = true

# Исключения для конкретных файлов/директорий.
[lint.per-file-ignores]
# В тестах разрешаем:
# S101 — использование assert (стандарт pytest)
# ANN — не требуем аннотаций в тестовых функциях
# PLR2004 — "магические числа" в assert-ах
"tests/**/*.py" = ["S101", "ANN", "PLR2004"]
# В __init__.py разрешаем неиспользуемые импорты (F401),
# так как это стандартный способ реэкспорта в aiogram-проектах
"**/__init__.py" = ["F401", "F403"]

# ──────────────────────────────────────────────
# ФОРМАТТЕР
# ──────────────────────────────────────────────

[format]
# Стиль кавычек — двойные (совместимость с Black).
quote-style = "double"
# Отступы — пробелы (стандарт PEP 8).
indent-style = "space"
# Пропускать магические trailing-запятые (как у Black).
skip-magic-trailing-comma = false
# Форматировать строки внутри docstring.
docstring-code-format = true
# Длина примеров кода в docstring.
docstring-code-line-length = 79
